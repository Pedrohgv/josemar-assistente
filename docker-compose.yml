services:
  aux-ml:
    profiles:
      - aux-ml
    build:
      context: .
      dockerfile: aux-ml/Dockerfile
      args:
        LLAMA_CPP_RELEASE_URL: ${AUX_ML_LLAMA_CPP_RELEASE_URL:-https://github.com/ggml-org/llama.cpp/releases/download/b9045/llama-b9045-bin-ubuntu-x64.tar.gz}
        LLAMA_CPP_RELEASE_SHA256: ${AUX_ML_LLAMA_CPP_RELEASE_SHA256:-1264b54287d7cf2cdfa991bbe6bead1c2df33bdf0fac2b4b082bf42995267212}
        ENABLE_GRANITE_SPEECH: ${AUX_ML_ENABLE_GRANITE_SPEECH:-true}
        GLM_OCR_MODEL_URL: ${AUX_ML_GLM_OCR_URL:-https://huggingface.co/ggml-org/GLM-OCR-GGUF/resolve/main/GLM-OCR-Q8_0.gguf}
        GLM_OCR_MODEL_SHA256: ${AUX_ML_GLM_OCR_SHA256:-45bc244a6446aff850521dc41f18bc8d7105ad5f0c2c8c28af04e7cc4f4d50b1}
        GLM_OCR_MMPROJ_URL: ${AUX_ML_GLM_OCR_MMPROJ_URL:-https://huggingface.co/ggml-org/GLM-OCR-GGUF/resolve/main/mmproj-GLM-OCR-Q8_0.gguf}
        GLM_OCR_MMPROJ_SHA256: ${AUX_ML_GLM_OCR_MMPROJ_SHA256:-9c4b58e33e316ed142eb5dcb41abec3844d3e6e5dc361ffb782c3fa9d175141f}
        GRANITE_SPEECH_MODEL_URL: ${AUX_ML_GRANITE_SPEECH_URL:-https://huggingface.co/ibm-granite/granite-speech-4.1-2b-GGUF/resolve/main/granite-speech-4.1-2b-Q8_0.gguf}
        GRANITE_SPEECH_MODEL_SHA256: ${AUX_ML_GRANITE_SPEECH_SHA256:-87320ee80cc6e638837bd2e9b7920252a87148613930bcdc11fcafad0b00beea}
        GRANITE_SPEECH_MMPROJ_URL: ${AUX_ML_GRANITE_SPEECH_MMPROJ_URL:-https://huggingface.co/ibm-granite/granite-speech-4.1-2b-GGUF/resolve/main/mmproj-model-f16.gguf}
        GRANITE_SPEECH_MMPROJ_SHA256: ${AUX_ML_GRANITE_SPEECH_MMPROJ_SHA256:-0d3615076cbe1d35c3f60c43a60a4047b3e2eeee1b2c233580be60186faab5c5}
    container_name: josemar-aux-ml
    restart: unless-stopped
    expose:
      - "8091"
    environment:
      - AUX_ML_PORT=8091
      - AUX_ML_BIND_HOST=0.0.0.0
      - AUX_ML_LLAMACPP_URL=http://127.0.0.1:8080
      - AUX_ML_MODEL_REGISTRY=/app/config/models.yaml
      - AUX_ML_MAX_QUEUE=${AUX_ML_MAX_QUEUE:-50}
      - AUX_ML_JOB_TIMEOUT_SECONDS=${AUX_ML_JOB_TIMEOUT_SECONDS:-1800}
      - AUX_ML_POLL_INTERVAL_SECONDS=${AUX_ML_POLL_INTERVAL_SECONDS:-1}
      - AUX_ML_ALLOWED_INPUT_DIRS=${AUX_ML_ALLOWED_INPUT_DIRS:-/opt/data/workspace}
      - AUX_ML_ENFORCE_MEMORY_LIMIT=${AUX_ML_ENFORCE_MEMORY_LIMIT:-true}
      - AUX_ML_MEMORY_LIMIT_MB=${AUX_ML_MEMORY_LIMIT_MB:-8192}
      - AUX_ML_OCR_MAX_PAGES=${AUX_ML_OCR_MAX_PAGES:-50}
      - AUX_ML_TRANSCRIBE_MAX_BYTES=${AUX_ML_TRANSCRIBE_MAX_BYTES:-104857600}
      - AUX_ML_TRANSCRIBE_MAX_DURATION_SECONDS=${AUX_ML_TRANSCRIBE_MAX_DURATION_SECONDS:-1800}
      - AUX_ML_TRANSCRIBE_MAX_CHUNKS=${AUX_ML_TRANSCRIBE_MAX_CHUNKS:-16}
      - AUX_ML_TRANSCRIBE_CHUNK_SECONDS=${AUX_ML_TRANSCRIBE_CHUNK_SECONDS:-240}
      - AUX_ML_TRANSCRIBE_OVERLAP_SECONDS=${AUX_ML_TRANSCRIBE_OVERLAP_SECONDS:-20}
      - AUX_ML_TRANSCRIBE_FFMPEG_TIMEOUT_SECONDS=${AUX_ML_TRANSCRIBE_FFMPEG_TIMEOUT_SECONDS:-300}
      - LLAMA_ROUTER_HOST=127.0.0.1
      - LLAMA_ROUTER_PORT=8080
      - LLAMA_MODELS_DIR=/models
      - LLAMA_PARALLEL=1
      - LLAMA_TIMEOUT=${AUX_ML_LLAMACPP_TIMEOUT_SECONDS:-1800}
      - LLAMA_CONT_BATCHING=false
    volumes:
      - hermes-workspace:/opt/data/workspace:ro
    mem_limit: ${AUX_ML_MEMORY_LIMIT:-8192m}
    networks:
      - josemar-network

  hermes:
    build:
      context: .
      dockerfile: Dockerfile.hermes
      args:
        HERMES_BASE_IMAGE: ${HERMES_BASE_IMAGE:-nousresearch/hermes-agent@sha256:64d839ecc207c70cec5e7a5d18cf644ec3be4a8ce8b81f11dd3c2ef737dcf433}
        GOGCLI_REF: ${GOGCLI_REF:-e88964a1b1a46483fbc6a55ecbf2192ff522f2ea}
    container_name: josemar-hermes
    restart: unless-stopped
    command: ["gateway", "run"]
    volumes:
      # Hermes-native persistent state (config, sessions, memories, skills, logs)
      - hermes-data:/opt/data
      # Workspace is separate so aux-ml can read input files without credential access
      - hermes-workspace:/opt/data/workspace
      # Dedicated Obsidian vault volume shared with the current deployment
      - obsidian-vault:/opt/data/obsidian
      # Mounted state repo can seed local development when WORKSPACE_STATE_REPO is absent
      - ./agent-state:/opt/josemar/source-agent-state:ro
      # Credentials are copied into /opt/data/credentials by the Hermes init hook
      - ./credentials:/opt/josemar/credentials-source:ro
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - HERMES_HOME=/opt/data
      - HERMES_TIMEZONE=${JOSEMAR_TIMEZONE:-America/Sao_Paulo}
      - HERMES_MODEL=${HERMES_MODEL:-kimi-k2.6}
      - HERMES_DASHBOARD=${HERMES_DASHBOARD:-1}
      - HERMES_DASHBOARD_HOST=${HERMES_DASHBOARD_HOST:-0.0.0.0}
      - HERMES_DASHBOARD_PORT=${HERMES_DASHBOARD_PORT:-9119}
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-0}
      - HERMES_DASHBOARD_TUI=${HERMES_DASHBOARD_TUI:-1}
      - HERMES_DASHBOARD_SESSION_TOKEN=${HERMES_DASHBOARD_SESSION_TOKEN:?Set HERMES_DASHBOARD_SESSION_TOKEN for Hermes Desktop REST/WebSocket access}
      - API_SERVER_ENABLED=${HERMES_API_SERVER_ENABLED:-false}
      - API_SERVER_HOST=${HERMES_API_SERVER_HOST:-0.0.0.0}
      - API_SERVER_PORT=${HERMES_API_SERVER_PORT:-8642}
      - API_SERVER_KEY=${HERMES_API_SERVER_KEY:-}
      - API_SERVER_CORS_ORIGINS=${HERMES_API_SERVER_CORS_ORIGINS:-}
      - API_SERVER_MODEL_NAME=${HERMES_API_SERVER_MODEL_NAME:-Josemar}
      - HERMES_DEFAULT_PROFILE_DISPLAY_NAME=${HERMES_DEFAULT_PROFILE_DISPLAY_NAME:-Josemar}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - GLM_API_KEY=${ZAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${PRIMARY_TELEGRAM_ID:-}
      - TELEGRAM_HOME_CHANNEL=${PRIMARY_TELEGRAM_ID:-}
      - GATEWAY_ALLOWED_USERS=${PRIMARY_TELEGRAM_ID:-}
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD:-}
      - XDG_CONFIG_HOME=/opt/data/workspace/.config
      - WORKSPACE_DIR=/opt/data/workspace
      - OBSIDIAN_VAULT_DIR=/opt/data/obsidian
      - VAULT_GATEWAY_ALLOWED_ROOTS=/opt/data/obsidian:/opt/data/workspace
      - JOSEMAR_CREDENTIALS_DIR=/opt/data/credentials
      - WORKSPACE_STATE_REPO=${WORKSPACE_STATE_REPO:-}
      - WORKSPACE_REPO_TOKEN=${WORKSPACE_REPO_TOKEN:-}
      - WORKSPACE_SYNC_ON_START=${WORKSPACE_SYNC_ON_START:-true}
      - WORKSPACE_SYNC_INTERVAL=${WORKSPACE_SYNC_INTERVAL:-60}
      - WORKSPACE_GIT_BRANCH=${WORKSPACE_GIT_BRANCH:-main}
      - WORKSPACE_GIT_USER_EMAIL=${WORKSPACE_GIT_USER_EMAIL:-agent@josemar.local}
      - WORKSPACE_GIT_USER_NAME=${WORKSPACE_GIT_USER_NAME:-Josemar Agent}
      - AUX_ML_ENABLED=${AUX_ML_ENABLED:-false}
      - AUX_ML_URL=${AUX_ML_URL:-http://aux-ml:8091}
      - AUX_ML_JOB_TIMEOUT_SECONDS=${AUX_ML_JOB_TIMEOUT_SECONDS:-1800}
      - AUX_ML_POLL_INTERVAL_SECONDS=${AUX_ML_POLL_INTERVAL_SECONDS:-2}
      - TZ=${TZ:-America/Sao_Paulo}
      - JOSEMAR_TIMEZONE=${JOSEMAR_TIMEZONE:-America/Sao_Paulo}
    ports:
      # Hermes OpenAI-compatible API server (disabled unless HERMES_API_SERVER_ENABLED=true)
      - "${HERMES_API_SERVER_BIND_IP:-127.0.0.1}:${HERMES_API_SERVER_PORT:-8642}:8642"
      # Hermes dashboard (disabled unless HERMES_DASHBOARD=1)
      - "${HERMES_DASHBOARD_BIND_IP:-0.0.0.0}:${HERMES_DASHBOARD_PORT:-9119}:9119"
    networks:
      - josemar-network
    healthcheck:
      test: ["CMD", "hermes", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  syncthing:
    image: syncthing/syncthing:latest
    container_name: josemar-syncthing
    restart: unless-stopped
    depends_on:
      - tailscale
    network_mode: service:tailscale
    user: "0:0"
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - PUID=0
      - PGID=0
    volumes:
      - syncthing-config:/var/syncthing/config
      - obsidian-vault:/var/syncthing/data/obsidian

  tailscale:
    image: tailscale/tailscale:latest
    container_name: josemar-tailscale
    restart: unless-stopped
    hostname: ${TAILSCALE_HOSTNAME:-josemar-server}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:-}
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    ports:
      # Syncthing GUI/API should stay localhost-only by default
      - "${SYNCTHING_GUI_BIND_IP:-127.0.0.1}:8384:8384"
    networks:
      - josemar-network

  obsidian-backup:
    image: rclone/rclone:latest
    container_name: josemar-obsidian-backup
    restart: unless-stopped
    depends_on:
      - syncthing
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - RCLONE_CONFIG=/config/rclone/rclone.conf
      - OBSIDIAN_BACKUP_TIME=${OBSIDIAN_BACKUP_TIME:-03:15}
      - OBSIDIAN_BACKUP_RUN_ON_START=${OBSIDIAN_BACKUP_RUN_ON_START:-false}
      - OBSIDIAN_GDRIVE_REMOTE=${OBSIDIAN_GDRIVE_REMOTE:-gdrive}
      - OBSIDIAN_GDRIVE_PATH=${OBSIDIAN_GDRIVE_PATH:-Josemar/obsidian-backups}
      - OBSIDIAN_BACKUP_SLOTS=${OBSIDIAN_BACKUP_SLOTS:-5}
    volumes:
      - ./scripts:/scripts:ro
      - obsidian-rclone-config:/config/rclone
      - obsidian-vault:/data/obsidian:ro
      - obsidian-backup-state:/state
    entrypoint: ["/bin/sh", "/scripts/obsidian-backup-daemon.sh"]
    networks:
      - josemar-network

networks:
  josemar-network:
    driver: bridge

volumes:
  hermes-data:
    driver: local
  hermes-workspace:
    driver: local
  obsidian-vault:
    driver: local
  syncthing-config:
    driver: local
  obsidian-rclone-config:
    driver: local
  obsidian-backup-state:
    driver: local
  tailscale-state:
    driver: local
