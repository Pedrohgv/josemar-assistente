services:
  openclaw:
    build: .
    container_name: josemar-assistente
    restart: unless-stopped
    volumes:
      # Mount configuration directory as source (entrypoint will copy)
      - ./config:/root/.openclaw-source:ro
      # Use named volume for ALL persistent OpenClaw state (devices, workspace, sessions, etc.)
      - openclaw-workspace:/root/.openclaw
      # Optional: mount scripts directory for development
      # - ./scripts:/app/scripts:ro
      # Optional: mount skills directory for development
      # - ./skills:/root/.openclaw-source/skills:ro
    environment:
      # Environment variables for API keys (to be set in .env file)
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PEDRO_TELEGRAM_ID=${PEDRO_TELEGRAM_ID:-}
      - GATEWAY_AUTH_TOKEN=${GATEWAY_AUTH_TOKEN:-}
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD:-}
      # Additional users can be added here following the pattern:
      # - ALICE_TELEGRAM_ID=${ALICE_TELEGRAM_ID:-}
      # - BOB_TELEGRAM_ID=${BOB_TELEGRAM_ID:-}
      # Other environment variables
      - OPENCLAW_LOG_LEVEL=info
    ports:
      # Metrics port
      - "9090:9090"
      # OpenClaw Gateway UI (requires GATEWAY_AUTH_TOKEN)
      - "18789:18789"
    networks:
      - openclaw-network
    # Health check
    healthcheck:
      test: ["CMD", "openclaw", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  openclaw-network:
    driver: bridge

volumes:
  openclaw-workspace:
    driver: local
