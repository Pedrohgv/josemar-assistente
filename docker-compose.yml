services:
  openclaw:
    build: .
    container_name: josemar-assistente
    restart: unless-stopped
    volumes:
      # Mount configuration directory as source (entrypoint will copy)
      - ./config:/root/.openclaw-source:ro
      # Use named volume for ALL persistent OpenClaw state (devices, workspace, sessions, etc.)
      - openclaw-workspace:/root/.openclaw
      # Optional: mount scripts directory for development
      # - ./scripts:/app/scripts:ro
      # Mount repo-maintained skills directory
      - ./repo-skills:/root/.openclaw-source-skills:ro
      # Mount credentials directory to OpenClaw standard location
      # Follows convention: ~/.openclaw/credentials/<service>/
      - ./credentials/gogcli:/root/.openclaw/credentials/gogcli:ro
    environment:
      # Environment variables for API keys (to be set in .env file)
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-true}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PEDRO_TELEGRAM_ID=${PEDRO_TELEGRAM_ID:-}
      - GATEWAY_AUTH_PASSWORD=${GATEWAY_AUTH_PASSWORD:-}
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD:-}
      # Additional users can be added here following the pattern:
      # - ALICE_TELEGRAM_ID=${ALICE_TELEGRAM_ID:-}
      # - BOB_TELEGRAM_ID=${BOB_TELEGRAM_ID:-}
      # Skills deployment configuration
      - FORCE_OVERWRITE_SKILLS=${FORCE_OVERWRITE_SKILLS:-}
      # Other environment variables
      - OPENCLAW_LOG_LEVEL=info
    ports:
      # Metrics port
      - "9090:9090"
      # OpenClaw Gateway UI (requires GATEWAY_AUTH_TOKEN)
      - "18789:18789"
    networks:
      - openclaw-network
    # Health check
    healthcheck:
      test: ["CMD", "openclaw", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  openclaw-network:
    driver: bridge

volumes:
  openclaw-workspace:
    driver: local
