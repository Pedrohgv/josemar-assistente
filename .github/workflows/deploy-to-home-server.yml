name: deploy-to-home-server

on:
  workflow_dispatch:
    inputs:
      fresh_start:
        description: 'WARNING: This ERASES AGENT WORKSPACE DATA (hermes-workspace volume). This action is IRREVERSIBLE. Obsidian vault volume is NOT removed.'
        required: false
        default: false
        type: boolean
      skip_git_sync:
        description: 'Skip git sync on this deployment (use local workspace state only)'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Clean up work directory
        run: sudo rm -rf ${{ github.workspace }}/credentials || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug User Info
        run: |
          echo "Current user: $(whoami)"
          echo "User ID: $(id -u)"
          echo "Group ID: $(id -g)"
          echo "Groups: $(id -Gn)"
          echo "Docker group members: $(getent group docker)"
          echo "Docker socket permissions: $(ls -la /var/run/docker.sock 2>/dev/null || echo 'Docker socket not found')"

      - name: Validate required repository variables
        env:
          WORKSPACE_STATE_REPO: ${{ vars.WORKSPACE_STATE_REPO }}
          SYNCTHING_GUI_BIND_IP: ${{ vars.SYNCTHING_GUI_BIND_IP }}
        run: |
          if [ -z "$WORKSPACE_STATE_REPO" ]; then
            echo "ERROR: Repository variable WORKSPACE_STATE_REPO is required"
            exit 1
          fi

          GUI_BIND_IP="$SYNCTHING_GUI_BIND_IP"
          if [ -n "$GUI_BIND_IP" ]; then
            if [ "$GUI_BIND_IP" = "0.0.0.0" ]; then
              echo "ERROR: SYNCTHING_GUI_BIND_IP cannot be 0.0.0.0"
              exit 1
            fi
            if ! echo "$GUI_BIND_IP" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "ERROR: SYNCTHING_GUI_BIND_IP must be an IPv4 address when set"
              exit 1
            fi
          fi

      - name: Create .env file
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PRIMARY_TELEGRAM_ID: ${{ secrets.PRIMARY_TELEGRAM_ID }}
          GOG_KEYRING_PASSWORD: ${{ secrets.GOG_KEYRING_PASSWORD }}
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          WORKSPACE_STATE_REPO: ${{ vars.WORKSPACE_STATE_REPO }}
          WORKSPACE_REPO_TOKEN: ${{ secrets.WORKSPACE_REPO_TOKEN }}
          WORKSPACE_SYNC_ON_START_VALUE: ${{ github.event.inputs.skip_git_sync == 'false' && 'true' || 'false' }}
          HERMES_BASE_IMAGE: ${{ vars.HERMES_BASE_IMAGE }}
          GOGCLI_REF: ${{ vars.GOGCLI_REF }}
          TZ_VALUE: ${{ vars.TZ }}
          TAILSCALE_HOSTNAME: ${{ vars.TAILSCALE_HOSTNAME }}
          TS_EXTRA_ARGS: ${{ vars.TS_EXTRA_ARGS }}
          SYNCTHING_GUI_BIND_IP: ${{ vars.SYNCTHING_GUI_BIND_IP }}
          HERMES_API_SERVER_ENABLED_INPUT: ${{ vars.HERMES_API_SERVER_ENABLED }}
          HERMES_API_SERVER_BIND_IP: ${{ vars.HERMES_API_SERVER_BIND_IP }}
          HERMES_API_SERVER_PORT: ${{ vars.HERMES_API_SERVER_PORT }}
          HERMES_API_SERVER_KEY: ${{ secrets.HERMES_API_SERVER_KEY }}
          HERMES_API_SERVER_CORS_ORIGINS: ${{ vars.HERMES_API_SERVER_CORS_ORIGINS }}
          HERMES_API_SERVER_MODEL_NAME_INPUT: ${{ vars.HERMES_API_SERVER_MODEL_NAME }}
          HERMES_DEFAULT_PROFILE_DISPLAY_NAME_INPUT: ${{ vars.HERMES_DEFAULT_PROFILE_DISPLAY_NAME }}
          HERMES_DASHBOARD_SESSION_TOKEN: ${{ secrets.HERMES_DASHBOARD_SESSION_TOKEN }}
          AUX_ML_ENABLED_INPUT: ${{ vars.AUX_ML_ENABLED }}
          AUX_ML_MEMORY_LIMIT: ${{ vars.AUX_ML_MEMORY_LIMIT }}
          AUX_ML_MEMORY_LIMIT_MB: ${{ vars.AUX_ML_MEMORY_LIMIT_MB }}
          AUX_ML_MAX_QUEUE: ${{ vars.AUX_ML_MAX_QUEUE }}
          AUX_ML_JOB_TIMEOUT_SECONDS: ${{ vars.AUX_ML_JOB_TIMEOUT_SECONDS }}
          AUX_ML_POLL_INTERVAL_SECONDS: ${{ vars.AUX_ML_POLL_INTERVAL_SECONDS }}
          AUX_ML_LLAMACPP_TIMEOUT_SECONDS: ${{ vars.AUX_ML_LLAMACPP_TIMEOUT_SECONDS }}
          AUX_ML_ENFORCE_MEMORY_LIMIT: ${{ vars.AUX_ML_ENFORCE_MEMORY_LIMIT }}
          AUX_ML_OCR_MAX_PAGES: ${{ vars.AUX_ML_OCR_MAX_PAGES }}
        run: |
          AUX_ML_ENABLED="$AUX_ML_ENABLED_INPUT"
          if [ -z "$AUX_ML_ENABLED" ]; then
            AUX_ML_ENABLED="true"
          fi

          COMPOSE_PROFILES_VALUE=""
          if [ "$AUX_ML_ENABLED" = "true" ]; then
            COMPOSE_PROFILES_VALUE="aux-ml"
          fi

          HERMES_API_SERVER_ENABLED="$HERMES_API_SERVER_ENABLED_INPUT"
          if [ -z "$HERMES_API_SERVER_ENABLED" ]; then
            HERMES_API_SERVER_ENABLED="false"
          fi

          if [ -z "$HERMES_API_SERVER_BIND_IP" ]; then
            HERMES_API_SERVER_BIND_IP="127.0.0.1"
          fi

          if [ -z "$HERMES_API_SERVER_PORT" ]; then
            HERMES_API_SERVER_PORT="8642"
          fi

          HERMES_API_SERVER_MODEL_NAME="$HERMES_API_SERVER_MODEL_NAME_INPUT"
          if [ -z "$HERMES_API_SERVER_MODEL_NAME" ]; then
            HERMES_API_SERVER_MODEL_NAME="Josemar"
          fi

          HERMES_DEFAULT_PROFILE_DISPLAY_NAME="$HERMES_DEFAULT_PROFILE_DISPLAY_NAME_INPUT"
          if [ -z "$HERMES_DEFAULT_PROFILE_DISPLAY_NAME" ]; then
            HERMES_DEFAULT_PROFILE_DISPLAY_NAME="Josemar"
          fi

          if [[ "$HERMES_DEFAULT_PROFILE_DISPLAY_NAME" == *$'\n'* || "$HERMES_DEFAULT_PROFILE_DISPLAY_NAME" == *$'\r'* ]]; then
            echo "ERROR: HERMES_DEFAULT_PROFILE_DISPLAY_NAME must be single-line"
            exit 1
          fi

          if [ "${#HERMES_DEFAULT_PROFILE_DISPLAY_NAME}" -gt 64 ]; then
            echo "ERROR: HERMES_DEFAULT_PROFILE_DISPLAY_NAME must be at most 64 characters"
            exit 1
          fi

          if [[ ! "$HERMES_DEFAULT_PROFILE_DISPLAY_NAME" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$ ]]; then
            echo "ERROR: HERMES_DEFAULT_PROFILE_DISPLAY_NAME must match ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$"
            exit 1
          fi

          if [ "$HERMES_API_SERVER_ENABLED" = "true" ] && [ -z "$HERMES_API_SERVER_KEY" ]; then
            echo "ERROR: HERMES_API_SERVER_KEY secret is required when HERMES_API_SERVER_ENABLED=true"
            exit 1
          fi

          if [ -z "$HERMES_DASHBOARD_SESSION_TOKEN" ]; then
            echo "ERROR: HERMES_DASHBOARD_SESSION_TOKEN secret is required for Hermes Desktop dashboard access"
            exit 1
          fi

          if [[ ! "$HERMES_DASHBOARD_SESSION_TOKEN" =~ ^[A-Za-z0-9._~-]{32,}$ ]]; then
            echo "ERROR: HERMES_DASHBOARD_SESSION_TOKEN must be at least 32 URL-safe characters"
            exit 1
          fi

          umask 077
          : > .env
          write_env() {
            printf '%s=%s\n' "$1" "$2" >> .env
          }

          write_env ZAI_API_KEY "$ZAI_API_KEY"
          write_env TELEGRAM_BOT_TOKEN "$TELEGRAM_BOT_TOKEN"
          write_env DEEPSEEK_API_KEY "$DEEPSEEK_API_KEY"
          write_env OLLAMA_API_KEY "$OLLAMA_API_KEY"
          write_env TAVILY_API_KEY "$TAVILY_API_KEY"
          write_env PRIMARY_TELEGRAM_ID "$PRIMARY_TELEGRAM_ID"
          write_env GOG_KEYRING_PASSWORD "$GOG_KEYRING_PASSWORD"
          write_env TS_AUTHKEY "$TS_AUTHKEY"
          write_env WORKSPACE_STATE_REPO "$WORKSPACE_STATE_REPO"
          write_env WORKSPACE_REPO_TOKEN "$WORKSPACE_REPO_TOKEN"
          write_env WORKSPACE_SYNC_ON_START "$WORKSPACE_SYNC_ON_START_VALUE"
          write_env WORKSPACE_SYNC_INTERVAL "60"
          write_env HERMES_BASE_IMAGE "$HERMES_BASE_IMAGE"
          write_env GOGCLI_REF "$GOGCLI_REF"
          write_env HERMES_TELEGRAM_BOT_TOKEN "$TELEGRAM_BOT_TOKEN"
          write_env HERMES_TELEGRAM_ALLOWED_USERS "$PRIMARY_TELEGRAM_ID"
          write_env HERMES_TELEGRAM_HOME_CHANNEL "$PRIMARY_TELEGRAM_ID"
          write_env HERMES_GATEWAY_ALLOWED_USERS "$PRIMARY_TELEGRAM_ID"
          write_env HERMES_API_SERVER_ENABLED "$HERMES_API_SERVER_ENABLED"
          write_env HERMES_API_SERVER_BIND_IP "$HERMES_API_SERVER_BIND_IP"
          write_env HERMES_API_SERVER_PORT "$HERMES_API_SERVER_PORT"
          write_env HERMES_API_SERVER_KEY "$HERMES_API_SERVER_KEY"
          write_env HERMES_API_SERVER_CORS_ORIGINS "$HERMES_API_SERVER_CORS_ORIGINS"
          write_env HERMES_API_SERVER_MODEL_NAME "$HERMES_API_SERVER_MODEL_NAME"
          write_env HERMES_DEFAULT_PROFILE_DISPLAY_NAME "$HERMES_DEFAULT_PROFILE_DISPLAY_NAME"
          write_env HERMES_DASHBOARD_INSECURE "0"
          write_env HERMES_DASHBOARD_TUI "1"
          write_env HERMES_DASHBOARD_SESSION_TOKEN "$HERMES_DASHBOARD_SESSION_TOKEN"
          write_env TZ "$TZ_VALUE"
          write_env TAILSCALE_HOSTNAME "$TAILSCALE_HOSTNAME"
          write_env TS_EXTRA_ARGS "$TS_EXTRA_ARGS"
          write_env SYNCTHING_GUI_BIND_IP "$SYNCTHING_GUI_BIND_IP"
          write_env AUX_ML_ENABLED "$AUX_ML_ENABLED"
          write_env COMPOSE_PROFILES "$COMPOSE_PROFILES_VALUE"
          write_env AUX_ML_URL "http://aux-ml:8091"
          write_env AUX_ML_MEMORY_LIMIT "$AUX_ML_MEMORY_LIMIT"
          write_env AUX_ML_MEMORY_LIMIT_MB "$AUX_ML_MEMORY_LIMIT_MB"
          write_env AUX_ML_MAX_QUEUE "$AUX_ML_MAX_QUEUE"
          write_env AUX_ML_JOB_TIMEOUT_SECONDS "$AUX_ML_JOB_TIMEOUT_SECONDS"
          write_env AUX_ML_POLL_INTERVAL_SECONDS "$AUX_ML_POLL_INTERVAL_SECONDS"
          write_env AUX_ML_LLAMACPP_TIMEOUT_SECONDS "$AUX_ML_LLAMACPP_TIMEOUT_SECONDS"
          write_env AUX_ML_ALLOWED_INPUT_DIRS "/opt/data/workspace"
          write_env AUX_ML_ENFORCE_MEMORY_LIMIT "$AUX_ML_ENFORCE_MEMORY_LIMIT"
          write_env AUX_ML_OCR_MAX_PAGES "$AUX_ML_OCR_MAX_PAGES"

          chmod 600 .env
          echo "COMPOSE_PROFILES=$COMPOSE_PROFILES_VALUE" >> "$GITHUB_ENV"

      - name: Set compose profiles
        run: |
          echo "COMPOSE_PROFILES=${COMPOSE_PROFILES}"

      - name: Validate aux-ml model source
        if: vars.AUX_ML_ENABLED != 'false'
        run: |
          if [ -f "aux-ml/models/glm-ocr.gguf" ]; then
            echo "Found local glm-ocr model in repository checkout"
          else
            echo "No local glm-ocr model found; compose default URL will be used"
          fi

          if [ -f "aux-ml/models/mmproj-glm-ocr.gguf" ]; then
            echo "Found local mmproj model in repository checkout"
          else
            echo "No local mmproj model found; compose default URL will be used"
          fi

      - name: Create rclone config for backup container
        run: |
          if [ -n "${{ secrets.RCLONE_CONFIG_B64 }}" ]; then
            COMPOSE_PROJECT=$(basename "$PWD")
            RCLONE_VOLUME="${COMPOSE_PROJECT}_obsidian-rclone-config"
            TMP_RCLONE_CONF=$(mktemp)
            trap 'rm -f "$TMP_RCLONE_CONF"' EXIT
            echo "${{ secrets.RCLONE_CONFIG_B64 }}" | base64 --decode > "$TMP_RCLONE_CONF"
            chmod 600 "$TMP_RCLONE_CONF"
            docker volume create "$RCLONE_VOLUME" >/dev/null
            docker run --rm \
              -v "$TMP_RCLONE_CONF:/tmp/rclone.conf:ro" \
              -v "$RCLONE_VOLUME:/config/rclone" \
              alpine:3.20 \
              sh -c 'cp /tmp/rclone.conf /config/rclone/rclone.conf && chmod 600 /config/rclone/rclone.conf'
            rm -f "$TMP_RCLONE_CONF"
            trap - EXIT
            echo "rclone config loaded into Docker volume"
          else
            echo "WARNING: RCLONE_CONFIG_B64 secret not set. Obsidian backups will fail until configured."
          fi

      - name: FRESH START - Remove workspace volume
        if: github.event.inputs.fresh_start == 'true'
        run: |
          echo "=========================================="
          echo "!!! WARNING: FRESH START REQUESTED !!!"
          echo "=========================================="
          echo "This will DELETE ALL agent data:"
          echo "  - All memory files (SOUL.md, MEMORY.md, AGENTS.md, etc.)"
          echo "  - All skills (including agent modifications)"
          echo "  - All session history and conversation data"
          echo "  - All uploaded files (PDFs, etc.)"
          echo "  - All workspace configuration"
          echo "  - Obsidian vault volume is NOT deleted"
          echo "=========================================="
          echo "Waiting 10 seconds before proceeding..."
          echo "Press Cancel on this workflow to abort."
          sleep 10
          docker compose down --remove-orphans || true
          docker volume rm josemar-assistente_hermes-workspace 2>/dev/null || true
          echo "Workspace volume removed"

      - name: Stop existing services
        run: docker compose down --remove-orphans

      - name: Clean up old Docker images
        run: |
          docker image prune -a -f
          docker builder prune -f
          docker rmi $(docker images 'josemar-assistente*' -q) 2>/dev/null || true

      - name: Build Docker image
        run: docker compose build --no-cache

      - name: Start services
        run: docker compose up -d

      - name: Verify tailscale sidecar login
        run: |
          echo "Checking tailscale sidecar status..."
          if ! docker compose ps tailscale | grep -q "Up"; then
            echo "ERROR: tailscale service is not running"
            docker compose ps
            exit 1
          fi

          TS_IP=""
          for i in {1..30}; do
            TS_IP="$(docker compose exec -T tailscale tailscale ip -4 2>/dev/null | sed -n '1p')"
            if echo "$TS_IP" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Tailscale sidecar connected with IPv4: $TS_IP"
              break
            fi
            echo "Waiting for tailscale login/connection... ($i/30)"
            sleep 2
          done

          if ! echo "$TS_IP" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tailscale sidecar is running but not logged in/connected"
            echo "Set TS_AUTHKEY secret or log in manually with: docker compose exec -T tailscale tailscale up"
            docker compose logs --tail=120 tailscale
            exit 1
          fi

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to be healthy..."
          for i in {1..30}; do
            if docker compose ps | grep -q "healthy"; then
              echo "Container is healthy"
              break
            fi
            echo "   Waiting... ($i/30)"
            sleep 2
          done

      - name: Verify deployment
        run: docker ps | grep josemar-hermes

      - name: Verify skill deployment
        run: |
          echo "Checking deployed skills..."
          docker compose exec -T hermes ls -la /opt/josemar/skills/ 2>/dev/null || echo "No skills deployed yet"

      - name: Cleanup sensitive files
        if: always()
        run: rm -f .env
