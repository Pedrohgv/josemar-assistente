name: deploy-to-home-server

on:
  workflow_dispatch:
    inputs:
      fresh_start:
        description: 'Erase existing workspace and start fresh'
        required: false
        default: false
        type: boolean
      force_overwrite_skills:
        description: 'Comma-separated skill names to force overwrite (e.g., pdf-extractor,web-scraper)'
        required: false
        default: ''
        type: string

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug User Info
        run: |
          echo "Current user: $(whoami)"
          echo "User ID: $(id -u)"
          echo "Group ID: $(id -g)"
          echo "Groups: $(id -Gn)"
          echo "Docker group members: $(getent group docker)"
          echo "Docker socket permissions: $(ls -la /var/run/docker.sock 2>/dev/null || echo 'Docker socket not found')"

      - name: Create .env file
        run: |
          cat > .env << EOF
          ZAI_API_KEY=${{ secrets.ZAI_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          PEDRO_TELEGRAM_ID=${{ secrets.PEDRO_TELEGRAM_ID }}
          GATEWAY_AUTH_PASSWORD=${{ secrets.GATEWAY_AUTH_PASSWORD }}
          GOG_KEYRING_PASSWORD=${{ secrets.GOG_KEYRING_PASSWORD }}
          FORCE_OVERWRITE_SKILLS=${{ github.event.inputs.force_overwrite_skills }}
          EOF

      - name: Optional fresh start - remove workspace volume
        if: github.event.inputs.fresh_start == 'true'
        run: |
          echo "Fresh start requested - removing workspace volume..."
          docker compose down || true
          docker volume rm josemar-assistente_openclaw-workspace 2>/dev/null || true
          echo "Workspace volume removed"

      - name: Stop existing services
        run: docker compose down

      - name: Clean up old Docker images
        run: |
          docker image prune -a -f
          docker builder prune -f
          docker rmi $(docker images 'josemar-assistente*' -q) 2>/dev/null || true

      - name: Build Docker image
        run: docker compose build --no-cache

      - name: Start services
        run: docker compose up -d

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to be healthy..."
          for i in {1..30}; do
            if docker compose ps | grep -q "healthy"; then
              echo "✅ Container is healthy"
              break
            fi
            echo "   Waiting... ($i/30)"
            sleep 2
          done

      - name: Verify deployment
        run: docker ps | grep josemar-assistente

      - name: Verify skill deployment
        run: |
          echo "Checking deployed skills..."
          echo "Repo skills:"
          docker compose exec -T openclaw ls -la /root/.openclaw/repo-skills/ 2>/dev/null || echo "No repo skills deployed yet"
          echo ""
          echo "Runtime skills:"
          docker compose exec -T openclaw ls -la /root/.openclaw/skills/ 2>/dev/null || echo "No runtime skills yet"
