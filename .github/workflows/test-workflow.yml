name: test-workflow

on:
  workflow_dispatch:

jobs:
  hello-world:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug User Info
        run: |
          echo "Current user: $(whoami)"
          echo "User ID: $(id -u)"
          echo "Group ID: $(id -g)"
          echo "Groups: $(id -Gn)"
          echo "Docker group members: $(getent group docker)"
          echo "Docker socket permissions: $(ls -la /var/run/docker.sock 2>/dev/null || echo 'Docker socket not found')"

      - name: Hello World
        run: |
          echo "Hello, World!"
          echo "This workflow is running on a self-hosted runner."
          echo "Runner name: ${{ runner.name }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
