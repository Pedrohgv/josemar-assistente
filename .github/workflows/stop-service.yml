name: stop-service

on:
  workflow_dispatch:

jobs:
  stop:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Stop services
        run: docker compose down

      - name: Verify services stopped
        run: |
          if docker ps | grep -Eq 'josemar-hermes|josemar-aux-ml|josemar-syncthing|josemar-tailscale|josemar-obsidian-backup'; then
            echo "ERROR: One or more services are still running!"
            exit 1
          else
            echo "SUCCESS: Services stopped successfully"
          fi
